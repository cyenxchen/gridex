services:
  gridex-pg:
    image: postgres:16-alpine
    container_name: gridex-pg-test
    environment:
      POSTGRES_USER: gridex
      POSTGRES_PASSWORD: gridex
      POSTGRES_DB: gridex_test
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridex -d gridex_test"]
      interval: 2s
      timeout: 3s
      retries: 20

  gridex-mysql:
    image: mysql:8.0
    container_name: gridex-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: gridex
      MYSQL_DATABASE: gridex_test
      MYSQL_USER: gridex
      MYSQL_PASSWORD: gridex
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "gridex", "-pgridex"]
      interval: 3s
      timeout: 5s
      retries: 30
